<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="0.5" stop-color="#312e81"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#g)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <!-- Label kept in the bottom-right corner so it won't sit behind the hero text -->
  <text x="1880" y="1040" font-family="system-ui, sans-serif" font-size="22" font-weight="600"
        fill="#ffffff" fill-opacity="0.18" text-anchor="end">
    Hero background placeholder — replace public/images/hero-bg.svg
  </text>
</svg>
